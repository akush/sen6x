name=SEN6x
version=1.0.0
author=Abhinav <abhinav@ipsator.com>
maintainer=Abhinav <abhinav@ipsator.com>
sentence=Driver for Sensirion SEN62, SEN63C, SEN65, SEN66, SEN68 and SEN69C air-quality sensors with I2C auto-detection.
paragraph=Single source tree that builds under both the Arduino IDE (ESP32) and ESP-IDF (>=5.2). Auto-detects the connected variant via Get Product Name and reads only the signals it supports (PM1/2.5/4/10, RH, T, plus VOC/NOx, HCHO and/or CO2 depending on variant). Portable C99 protocol core with a compile-time-switched transport (Wire or driver/i2c_master).
category=Sensors
